<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="css/app.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Expenses chart component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
    <main class="contenedor-mobile contenedor">
        <div class="flex card-balance">
            <div class="">
                <p>My balance</p>
                <span class="precio">$921.48</span>
            </div>
            <img src="images/logo.svg" alt="Imagen de logo">
        </div><!--fin div flex card-balance-->
        <div class="card-spending">
            <h4 class="h-spending">Spending - Last 7 days</h4>
            <div class="grid-dias">
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">mon</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">tue</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">wed</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">thu</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">fri</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">sat</p>
              </div>
              <div class="dia-semana">
                <div class="barra"></div>
                <p class="dia-barra">sun</p>
              </div>
            </div><!--fin div grid-dias-->

            <div class="barrita"></div>
            <div class="flex-spending">
              <div>
                <p class="total-spending">Total this month</p>
                <span class="precio-spending">$478.33</span>
              </div>
              <p class="porcentaje">+2.4% <span>from last month</span></p>
            </div><!--fin div flex spending-->
        </div>
    
    </main>
    
  
  

  

  <!-- mon
  tue
  wed
  thu
  fri
  sat
  sun -->

  
 

  
  
  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">David Adame Soto</a>.
  </div>
  <script src="js/app.js"></script>
</body>
</html>
